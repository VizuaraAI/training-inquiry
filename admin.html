<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Training Inquiries</title>
    <link rel="icon" type="image/png" href="vizlogo.png">
    <style>
        :root {
            --bg: #f8f8fa;
            --surface: #ffffff;
            --border: #e5e5e7;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #d946ef;
            --accent-light: rgba(217, 70, 239, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
        }

        .login-card img { width: 48px; height: 48px; margin-bottom: 16px; }
        .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .login-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

        .login-card input {
            width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
            border-radius: 10px; font-size: 15px; font-family: inherit;
            outline: none; text-align: center; letter-spacing: 2px;
        }
        .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

        .login-btn {
            width: 100%; padding: 13px; margin-top: 16px;
            background: linear-gradient(135deg, #d946ef, #a855f7);
            color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }

        /* Dashboard */
        .dashboard { display: none; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-left img { width: 32px; height: 32px; }
        .topbar-left h1 { font-size: 18px; font-weight: 700; }

        .topbar-right { display: flex; align-items: center; gap: 16px; }

        .refresh-btn, .export-btn, .logout-btn {
            padding: 8px 16px; border-radius: 8px; font-size: 13px;
            font-weight: 600; font-family: inherit; cursor: pointer;
            transition: all 0.2s; border: 1px solid var(--border);
            background: var(--surface); color: var(--text);
        }
        .refresh-btn:hover, .export-btn:hover { background: #f0f0f2; }
        .logout-btn { color: #ef4444; border-color: #fecaca; }
        .logout-btn:hover { background: #fef2f2; }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
        }

        .stat-card .stat-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; }
        .stat-card .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* Table */
        .table-container {
            padding: 0 32px 60px;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .table-header h2 { font-size: 16px; font-weight: 700; }
        .search-input {
            padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; font-family: inherit; outline: none; width: 260px;
        }
        .search-input:focus { border-color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        thead th:hover { color: var(--accent); }

        tbody td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f2;
            vertical-align: top;
            max-width: 200px;
        }

        tbody tr:hover { background: #faf5ff; }
        tbody tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-budget {
            background: #f0fdf4; color: #15803d;
        }
        .badge-team { background: #eff6ff; color: #1d4ed8; }
        .badge-duration { background: #fdf4ff; color: #a21caf; }

        .td-email a { color: var(--accent); text-decoration: none; }
        .td-email a:hover { text-decoration: underline; }

        .td-needs {
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }
        .td-needs:hover { white-space: normal; }

        .td-date { white-space: nowrap; color: var(--text-secondary); font-size: 13px; }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }

        @media (max-width: 768px) {
            .topbar, .stats, .table-container { padding-left: 16px; padding-right: 16px; }
            .stats { grid-template-columns: 1fr 1fr; }
            table { font-size: 13px; }
            tbody td { padding: 10px 12px; }
        }

        /* Detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            max-width: 560px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .modal .modal-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
        .modal-close {
            float: right; background: none; border: none; font-size: 24px;
            cursor: pointer; color: var(--text-secondary); padding: 0; line-height: 1;
        }
        .modal-close:hover { color: var(--text); }

        .detail-row { margin-bottom: 16px; }
        .detail-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .detail-value { font-size: 15px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- Login -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <img src="vizlogo.png" alt="Vizuara AI">
            <h1>Admin Dashboard</h1>
            <p>Enter the admin password to view inquiries</p>
            <form id="loginForm">
                <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
                <button type="submit" class="login-btn">Sign In</button>
                <div class="login-error" id="loginError">Incorrect password. Try again.</div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="topbar">
            <div class="topbar-left">
                <img src="vizlogo.png" alt="Vizuara AI">
                <h1>Training Inquiries</h1>
            </div>
            <div class="topbar-right">
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
                <button class="export-btn" onclick="exportCSV()">Export CSV</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="table-container">
            <div class="table-header">
                <h2>All Inquiries</h2>
                <input type="text" class="search-input" placeholder="Search by name, company, email..." oninput="filterTable(this.value)">
            </div>
            <div id="tableArea">
                <div class="loading">Loading inquiries...</div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://anfjlyiauzjqumhlocrt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZmpseWlhdXpqcXVtaGxvY3J0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDY4MTc0OCwiZXhwIjoyMDkwMjU3NzQ4fQ.fm5pauhVECqxvDLEs7505E__mePiR3H8IAxOivJkm-E';
        const ADMIN_HASH = '303a4d46fcf7b6a1efceb28b5bb2abfffb506a93925640bb1ec6813219880d41';

        let allData = [];

        // Simple SHA-256 hash
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('passwordInput').value;
            const hash = await sha256(pw);

            if (hash === ADMIN_HASH) {
                sessionStorage.setItem('admin_auth', 'true');
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        // Check existing session
        if (sessionStorage.getItem('admin_auth') === 'true') {
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        }

        function logout() {
            sessionStorage.removeItem('admin_auth');
            location.reload();
        }

        async function loadData() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/training_inquiries?select=*&order=created_at.desc`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            allData = await res.json();
            renderStats();
            renderTable(allData);
        }

        function renderStats() {
            const total = allData.length;
            const thisWeek = allData.filter(d => {
                const created = new Date(d.created_at);
                const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
                return created >= weekAgo;
            }).length;

            const budgetCounts = {};
            allData.forEach(d => { if (d.budget) budgetCounts[d.budget] = (budgetCounts[d.budget] || 0) + 1; });
            const topBudget = Object.entries(budgetCounts).sort((a, b) => b[1] - a[1])[0];

            const companies = new Set(allData.map(d => d.company).filter(Boolean));

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Inquiries</div>
                    <div class="stat-value">${total}</div>
                    <div class="stat-sub">${thisWeek} this week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Unique Companies</div>
                    <div class="stat-value">${companies.size}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Most Common Budget</div>
                    <div class="stat-value" style="font-size: 20px">${topBudget ? topBudget[0] : '—'}</div>
                    <div class="stat-sub">${topBudget ? topBudget[1] + ' inquiries' : ''}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Latest Inquiry</div>
                    <div class="stat-value" style="font-size: 18px">${allData.length ? formatDate(allData[0].created_at) : '—'}</div>
                    <div class="stat-sub">${allData.length ? allData[0].name : ''}</div>
                </div>
            `;
        }

        function renderTable(data) {
            if (data.length === 0) {
                document.getElementById('tableArea').innerHTML = `
                    <div class="empty-state">
                        <h3>No inquiries yet</h3>
                        <p>Inquiries will appear here once someone fills out the form.</p>
                    </div>`;
                return;
            }

            let html = `<table>
                <thead><tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Company</th>
                    <th>Email</th>
                    <th>Team Size</th>
                    <th>Duration</th>
                    <th>Budget</th>
                    <th>Timeline</th>
                </tr></thead><tbody>`;

            data.forEach((row, i) => {
                html += `<tr onclick="showDetail(${i})" style="cursor:pointer">
                    <td class="td-date">${formatDate(row.created_at)}</td>
                    <td><strong>${esc(row.name)}</strong></td>
                    <td>${esc(row.company || '—')}</td>
                    <td class="td-email"><a href="mailto:${esc(row.email)}">${esc(row.email)}</a></td>
                    <td><span class="badge badge-team">${esc(row.team_size || '—')}</span></td>
                    <td><span class="badge badge-duration">${esc(row.duration || '—')}</span></td>
                    <td><span class="badge badge-budget">${esc(row.budget || '—')}</span></td>
                    <td>${esc(row.timeline || '—')}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('tableArea').innerHTML = html;
        }

        function filterTable(query) {
            const q = query.toLowerCase();
            const filtered = allData.filter(d =>
                (d.name || '').toLowerCase().includes(q) ||
                (d.company || '').toLowerCase().includes(q) ||
                (d.email || '').toLowerCase().includes(q) ||
                (d.budget || '').toLowerCase().includes(q)
            );
            renderTable(filtered);
        }

        function showDetail(index) {
            const d = allData[index];
            document.getElementById('modalContent').innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <h2>${esc(d.name)}</h2>
                <div class="modal-sub">${esc(d.company || '')} ${d.job_title ? '· ' + esc(d.job_title) : ''} · ${formatDate(d.created_at)}</div>

                <div class="detail-grid">
                    <div class="detail-row">
                        <div class="detail-label">Email</div>
                        <div class="detail-value"><a href="mailto:${esc(d.email)}" style="color:var(--accent)">${esc(d.email)}</a></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">LinkedIn</div>
                        <div class="detail-value">${d.linkedin ? '<a href="' + esc(d.linkedin) + '" target="_blank" style="color:var(--accent)">View Profile</a>' : '—'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Team Size</div>
                        <div class="detail-value"><span class="badge badge-team">${esc(d.team_size || '—')}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Duration</div>
                        <div class="detail-value"><span class="badge badge-duration">${esc(d.duration || '—')}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Budget</div>
                        <div class="detail-value"><span class="badge badge-budget">${esc(d.budget || '—')}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Timeline</div>
                        <div class="detail-value">${esc(d.timeline || '—')}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Start Date</div>
                        <div class="detail-value">${esc(d.start_date || '—')}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Topics</div>
                        <div class="detail-value">${esc(d.topics || '—')}</div>
                    </div>
                </div>
                ${d.needs ? `
                <div class="detail-row" style="margin-top:8px">
                    <div class="detail-label">Needs / Notes</div>
                    <div class="detail-value" style="background:var(--bg);padding:12px 16px;border-radius:8px;margin-top:6px">${esc(d.needs)}</div>
                </div>` : ''}
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('visible');
        }

        function exportCSV() {
            if (!allData.length) return;
            const headers = ['Date','Name','Email','Company','Job Title','LinkedIn','Team Size','Duration','Topics','Needs','Budget','Start Date','Timeline'];
            const rows = allData.map(d => [
                formatDate(d.created_at), d.name, d.email, d.company, d.job_title, d.linkedin,
                d.team_size, d.duration, d.topics, d.needs, d.budget, d.start_date, d.timeline
            ].map(v => '"' + (v || '').replace(/"/g, '""') + '"').join(','));

            const csv = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `training-inquiries-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function formatDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function esc(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>

</body>
</html>
